name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect docs-impacting changes
        id: docs_changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'scripts/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate changesets
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Ensure we have enough history for changesets to locate merge-base.
          # In shallow clones with multi-commit PRs, --since <base_sha> can fail.
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --no-tags --prune --unshallow origin
          fi

          # Fetch base SHA explicitly so git diff works even if the base commit
          # is not yet present in the local object database.
          git fetch --no-tags --depth=1 origin "$BASE_SHA"

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" HEAD)"

          if ! echo "$CHANGED_FILES" | grep -q "^packages/"; then
            echo "No package changes detected, skipping changeset check"
            exit 0
          fi

          NON_VERSION_PACKAGE_CHANGES="$(echo "$CHANGED_FILES" | grep "^packages/" | grep -Ev '^packages/[^/]+/(CHANGELOG\.md|package\.json)$' || true)"
          if [ -z "$NON_VERSION_PACKAGE_CHANGES" ]; then
            echo "Only package version files changed (CHANGELOG.md/package.json), skipping changeset check"
            exit 0
          fi

          if ! npx --yes @changesets/cli status --since "$BASE_SHA"; then
            echo "One or more packages were modified without a changeset. Run 'npx changeset' to add one."
            exit 1
          fi

      - name: Lint & format check
        run: pnpm biome check .

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build docs (custom domain)
        env:
          DOCS_DEPLOY_TARGET: custom-domain
        run: pnpm docs:build

      - name: Verify docs asset paths (custom domain)
        env:
          DOCS_DEPLOY_TARGET: custom-domain
        run: pnpm docs:check:custom-domain-assets

      - name: Run tests
        run: pnpm test

      - name: Run docs generation/build/validation gate
        if: github.event_name != 'pull_request' || steps.docs_changes.outputs.docs == 'true'
        run: pnpm docs:ci
