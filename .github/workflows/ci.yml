name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect docs-impacting changes
        id: docs_changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'scripts/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm biome check .

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Build docs (custom domain)
        env:
          DOCS_DEPLOY_TARGET: custom-domain
        run: pnpm docs:build

      - name: Verify docs asset paths (custom domain)
        env:
          DOCS_DEPLOY_TARGET: custom-domain
        run: pnpm docs:check:custom-domain-assets

      - name: Run tests
        run: pnpm test

      - name: Run docs generation/build/validation gate
        if: github.event_name != 'pull_request' || steps.docs_changes.outputs.docs == 'true'
        run: pnpm docs:ci
