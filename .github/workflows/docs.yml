name: Docs

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - packages/**
      - scripts/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages-status.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Configure GitHub Pages
        id: pages-config
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Detect Pages availability
        id: pages-status
        run: |
          if [ "${{ steps.pages-config.outcome }}" = "success" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages is not enabled or this workflow token cannot manage it. Skipping deploy."
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Generate docs from CLI manifests
        run: pnpm docs:generate

      - name: Build VitePress site
        run: pnpm docs:build

      - name: Upload GitHub Pages artifact
        if: steps.pages-status.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy docs
    if: needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
