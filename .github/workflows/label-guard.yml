name: Label Guard

on:
  issues:
    types: [labeled, unlabeled]
  pull_request_target:
    types: [labeled, unlabeled]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  guard-issue-labels:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const actor = context.actor;
            const issue_number = context.payload.issue.number;
            const labelName = context.payload.label?.name;
            const action = context.payload.action; // labeled | unlabeled

            // Allow repo automation bot itself
            if (actor === 'github-actions[bot]') return;

            // Check actor permission level on repo
            const permResp = await github.rest.repos.getCollaboratorPermissionLevel({
              owner, repo, username: actor,
            });
            const perm = permResp.data.permission; // admin | maintain | write | triage | read | none
            const allowed = ['admin', 'maintain'];

            if (allowed.includes(perm)) {
              core.info(`Allowed label action by ${actor} (${perm})`);
              return;
            }

            core.warning(`Reverting unauthorized issue label action by ${actor} (${perm}) on #${issue_number}: ${action} ${labelName}`);

            if (action === 'labeled') {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: labelName });
              } catch (e) {
                core.warning(`Failed removeLabel revert: ${e.message}`);
              }
            } else if (action === 'unlabeled') {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [labelName] });
              } catch (e) {
                core.warning(`Failed addLabels revert: ${e.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `⚠️ Label change reverted: @${actor} does not have maintainer/admin permission for label management.`
            });

  guard-pr-labels:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const actor = context.actor;
            const pr_number = context.payload.pull_request.number;
            const labelName = context.payload.label?.name;
            const action = context.payload.action; // labeled | unlabeled

            if (actor === 'github-actions[bot]') return;

            const permResp = await github.rest.repos.getCollaboratorPermissionLevel({
              owner, repo, username: actor,
            });
            const perm = permResp.data.permission;
            const allowed = ['admin', 'maintain'];

            if (allowed.includes(perm)) {
              core.info(`Allowed PR label action by ${actor} (${perm})`);
              return;
            }

            core.warning(`Reverting unauthorized PR label action by ${actor} (${perm}) on #${pr_number}: ${action} ${labelName}`);

            if (action === 'labeled') {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: pr_number, name: labelName });
              } catch (e) {
                core.warning(`Failed removeLabel revert: ${e.message}`);
              }
            } else if (action === 'unlabeled') {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: pr_number, labels: [labelName] });
              } catch (e) {
                core.warning(`Failed addLabels revert: ${e.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: `⚠️ Label change reverted: @${actor} does not have maintainer/admin permission for label management.`
            });
